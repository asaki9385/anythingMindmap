# Nginx 配置模板文件
# 保存为: /etc/nginx/sites-available/knowledge-tree
# 然后创建软链接: ln -s /etc/nginx/sites-available/knowledge-tree /etc/nginx/sites-enabled/
# 重启Nginx: systemctl restart nginx

# ============================================
# HTTP 重定向到 HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name your_domain.com www.your_domain.com;

    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS 主服务器
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your_domain.com www.your_domain.com;

    # ========== SSL/TLS 配置 ==========
    ssl_certificate /etc/letsencrypt/live/your_domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your_domain.com/privkey.pem;
    
    # SSL安全设置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # SSL安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========== 日志配置 ==========
    access_log /var/log/nginx/knowledge-tree_access.log;
    error_log /var/log/nginx/knowledge-tree_error.log;

    # ========== 性能优化 ==========
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # 缓存
    expires 7d;

    # ========== 请求大小限制 ==========
    # 允许大文件上传 (最多500MB)
    client_max_body_size 500M;
    client_body_buffer_size 128k;

    # ========== 超时设置 ==========
    client_connect_timeout 60s;
    client_send_timeout 60s;
    client_body_timeout 60s;

    # ========== 路由配置 ==========

    # 主应用代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # 基础代理配置
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 静态文件优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API上传端点特殊处理
    location /api/upload {
        proxy_pass http://127.0.0.1:8000;
        
        # 上传端点特殊配置
        client_max_body_size 500M;
        proxy_request_buffering off;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 上传超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;      # 10分钟
        proxy_read_timeout 600s;      # 10分钟
    }

    # API其他端点
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 健康检查端点
    location /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # 禁止访问敏感目录
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 404 页面
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 50x 页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}

