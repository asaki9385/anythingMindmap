<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Tree - 打开已有</title>
<link rel="stylesheet" href="theme.css">
<style>
/* ════════════════════════════════════════════════════════════════
   Browse Page — Curated Library Catalog
   ════════════════════════════════════════════════════════════════ */

/* ── Subtle Grain Texture ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
.browse-page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.browse-header {
  padding: var(--sp-6) var(--sp-8);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.browse-header-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: var(--sp-4);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: var(--text-sm);
  color: var(--ink-muted);
  text-decoration: none;
  transition: color var(--duration-fast) var(--ease-out);
}

.back-link:hover {
  color: var(--accent);
}

.back-link .arrow {
  font-size: var(--text-lg);
  line-height: 1;
  transition: transform var(--duration-fast) var(--ease-out);
}

.back-link:hover .arrow {
  transform: translateX(-3px);
}

.browse-title {
  font-family: var(--font-serif);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  color: var(--ink);
  margin: 0;
}

/* ── Main Content ── */
.browse-main {
  flex: 1;
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
  padding: var(--sp-8) var(--sp-8) var(--sp-12);
}

/* ── Section ── */
.browse-section {
  margin-bottom: var(--sp-12);
}

.section-header {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-bottom: var(--sp-6);
  padding-bottom: var(--sp-3);
  border-bottom: 1px solid var(--border);
}

.section-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.section-icon--amber {
  background: var(--tag-accent-bg);
  color: var(--accent);
}

.section-icon--teal {
  background: var(--tag-teal-bg);
  color: var(--accent-secondary);
}

.section-title {
  font-family: var(--font-serif);
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--ink);
  margin: 0;
}

.section-count {
  font-size: var(--text-sm);
  color: var(--ink-muted);
  margin-left: var(--sp-2);
}

/* ── Card Grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--sp-4);
}

/* ── Browse Card ── */
.browse-card {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-4);
  padding: var(--sp-5);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  text-decoration: none;
  color: inherit;
  transition: transform var(--duration-normal) var(--ease-out),
              border-color var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out);
  opacity: 0;
  transform: translateY(12px);
  animation: cardReveal var(--duration-slow) var(--ease-out) forwards;
}

.browse-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: var(--shadow-md), 0 0 0 1px var(--border-accent);
  z-index: 100;
}

.browse-card:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}

.card-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: transform var(--duration-fast) var(--ease-out);
}

.browse-card:hover .card-icon {
  transform: scale(1.05);
}

.card-icon--amber {
  background: var(--tag-accent-bg);
  color: var(--accent);
}

.card-icon--teal {
  background: var(--tag-teal-bg);
  color: var(--accent-secondary);
}

.card-icon--green {
  background: var(--tag-success-bg);
  color: var(--success);
}

.card-body {
  flex: 1;
  min-width: 0;
}

.card-filename {
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  color: var(--ink);
  line-height: var(--leading-tight);
  margin-bottom: var(--sp-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  font-size: var(--text-xs);
  color: var(--ink-muted);
  margin-bottom: var(--sp-2);
}

.card-meta-item {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  white-space: nowrap;
}

.card-meta-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--ink-muted);
  opacity: 0.5;
  flex-shrink: 0;
}

/* ── Status Badge ── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  line-height: 1.4;
}

.status-badge--done {
  background: var(--tag-success-bg);
  color: var(--success);
}

.status-badge--incomplete {
  background: var(--tag-accent-bg);
  color: var(--accent);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ── Source Badge ── */
.source-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  background: var(--surface-raised);
  color: var(--ink-muted);
  border: 1px solid var(--border);
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: var(--sp-10) var(--sp-6);
  color: var(--ink-muted);
}

.empty-icon {
  font-size: 32px;
  margin-bottom: var(--sp-3);
  opacity: 0.5;
}

.empty-text {
  font-size: var(--text-md);
  font-weight: var(--weight-medium);
  color: var(--ink-secondary);
  margin-bottom: var(--sp-2);
}

.empty-hint {
  font-size: var(--text-sm);
  color: var(--ink-muted);
}

/* ── Loading State ── */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-3);
  padding: var(--sp-8) var(--sp-6);
  color: var(--ink-muted);
  font-size: var(--text-sm);
}

.loading-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Card Reveal Animation ── */
@keyframes cardReveal {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── Error State ── */
.error-state {
  text-align: center;
  padding: var(--sp-6);
  color: var(--danger);
  font-size: var(--text-sm);
}

.error-state button {
  margin-top: var(--sp-3);
  font-size: var(--text-sm);
}

/* ── Theme Toggle ── */
.theme-toggle {
  position: fixed;
  bottom: var(--sp-6);
  right: var(--sp-6);
  z-index: 100;
  padding: var(--sp-2) var(--sp-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  transition: background var(--duration-fast) var(--ease-out),
              border-color var(--duration-fast) var(--ease-out);
  box-shadow: var(--shadow-sm);
}

.theme-toggle:hover {
  background: var(--surface-raised);
  border-color: var(--border-strong);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .browse-header {
    padding: var(--sp-4) var(--sp-4);
  }
  .browse-main {
    padding: var(--sp-6) var(--sp-4) var(--sp-10);
  }
  .card-grid {
    grid-template-columns: 1fr;
  }
  .browse-title {
    font-size: var(--text-xl);
  }
}

@media (max-width: 480px) {
  .card-meta {
    flex-wrap: wrap;
  }
}

/* Hide tooltips on touch devices */
@media (hover: none) {
  .card-tooltip {
    display: none;
  }
}

/* ── Tooltip ── */
.browse-card {
  position: relative;
}

.card-tooltip {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(-4px);
  min-width: 220px;
  max-width: 320px;
  padding: var(--sp-4);
  background: var(--surface-raised);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  z-index: 999;
}

.card-tooltip::before {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-bottom-color: var(--border-strong);
}

.browse-card:hover .card-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.tooltip-label {
  font-size: var(--text-xs);
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--sp-1);
}

.tooltip-files {
  list-style: none;
  padding: 0;
  margin: 0 0 var(--sp-3) 0;
}

.tooltip-files li {
  font-size: var(--text-sm);
  color: var(--ink);
  padding: 2px 0;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.tooltip-files li::before {
  content: '📄';
  font-size: 12px;
  flex-shrink: 0;
}

.tooltip-stats {
  display: flex;
  gap: var(--sp-4);
  padding-top: var(--sp-2);
  border-top: 1px solid var(--border);
}

.tooltip-stat {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.tooltip-stat-value {
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--ink);
}

.tooltip-stat-label {
  font-size: var(--text-xs);
  color: var(--ink-muted);
}

/* ── Accessibility ── */
@media (prefers-reduced-motion: reduce) {
  .browse-card {
    opacity: 1;
    transform: none;
    animation: none;
  }
  .card-tooltip {
    transition: none;
  }
}
</style>
</head>
<body>
<div class="browse-page">
  <!-- Header -->
  <header class="browse-header">
    <div class="browse-header-inner">
      <a href="/ui/homepage.html" class="back-link">
        <span class="arrow">&larr;</span>
        <span>返回首页</span>
      </a>
      <div class="divider"></div>
      <h1 class="browse-title">打开已有</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="browse-main">
    <!-- Local Knowledge Trees Section -->
    <section class="browse-section">
      <div class="section-header">
        <div class="section-icon section-icon--amber">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2 class="section-title">本地知识树</h2>
        <span class="section-count" id="filesCount"></span>
      </div>
      <div id="filesContainer">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <span>加载中...</span>
        </div>
      </div>
    </section>

    <!-- Historical Tasks Section -->
    <section class="browse-section">
      <div class="section-header">
        <div class="section-icon section-icon--teal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h2 class="section-title">历史任务</h2>
        <span class="section-count" id="tasksCount"></span>
      </div>
      <div id="tasksContainer">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <span>加载中...</span>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
  <span id="themeIcon">🌙</span>
  <span id="themeLabel" class="hide-small">Dark</span>
</button>

<script>
(function() {
'use strict';

// ── Theme Management ──

function getTheme() {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
}

function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    localStorage.setItem('kt-theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    localStorage.setItem('kt-theme', 'dark');
  }
  updateThemeUI();
  return getTheme();
}

function initTheme() {
  var saved = localStorage.getItem('kt-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeUI();
}

function updateThemeUI() {
  var isDark = getTheme() === 'dark';
  var icon = document.getElementById('themeIcon');
  var label = document.getElementById('themeLabel');
  if (icon) icon.textContent = isDark ? '🌙' : '☀️';
  if (label) label.textContent = isDark ? 'Dark' : 'Light';
}

// ── Helpers ──

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatSize(bytes) {
  if (!bytes || bytes < 0) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function formatDate(isoString) {
  if (!isoString) return '-';
  try {
    var date = new Date(isoString);
    if (isNaN(date.getTime())) return '-';
    var year = date.getFullYear();
    var month = String(date.getMonth() + 1).padStart(2, '0');
    var day = String(date.getDate()).padStart(2, '0');
    var hours = String(date.getHours()).padStart(2, '0');
    var minutes = String(date.getMinutes()).padStart(2, '0');
    return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
  } catch (e) {
    return '-';
  }
}

function formatRelativeDate(isoString) {
  if (!isoString) return '';
  try {
    var date = new Date(isoString);
    if (isNaN(date.getTime())) return '';
    var now = new Date();
    var diffMs = now - date;
    var diffMins = Math.floor(diffMs / 60000);
    var diffHours = Math.floor(diffMs / 3600000);
    var diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return '刚刚';
    if (diffMins < 60) return diffMins + ' 分钟前';
    if (diffHours < 24) return diffHours + ' 小时前';
    if (diffDays < 7) return diffDays + ' 天前';
    return formatDate(isoString);
  } catch (e) {
    return '';
  }
}

function getDisplayName(filename) {
  if (!filename) return '未命名';
  // Remove .json extension
  var name = filename.replace(/\.json$/i, '');
  // Clean up task_ prefix
  if (name.startsWith('task_')) {
    name = name.substring(5);
  }
  return name;
}

// ── Card Rendering ──

function createFileCard(file, index) {
  var displayName = getDisplayName(file.filename);
  var relativeDate = formatRelativeDate(file.modified);
  var displaySize = formatSize(file.size);
  var isTask = file.source === 'task';

  var linkHref = '/ui/tree_mindmap.html?file=' + encodeURIComponent(file.filename);

  var iconClass = isTask ? 'card-icon--teal' : 'card-icon--amber';
  var iconSvg = isTask
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

  var sourceBadge = isTask
    ? '<span class="source-badge">任务</span>'
    : '<span class="source-badge">本地</span>';

  // Build tooltip content
  var tooltipHtml = '';
  var originalFiles = file.original_files || [];
  var nodeCount = file.node_count || 0;

  if (originalFiles.length > 0 || nodeCount > 0) {
    var filesListHtml = '';
    if (originalFiles.length > 0) {
      var displayFiles = originalFiles.slice(0, 5);
      filesListHtml = '<ul class="tooltip-files">' +
        displayFiles.map(function(f) { return '<li>' + escapeHtml(f) + '</li>'; }).join('') +
        (originalFiles.length > 5 ? '<li style="color:var(--ink-muted)">+' + (originalFiles.length - 5) + ' 个文件</li>' : '') +
        '</ul>';
    }

    var statsHtml = '';
    if (nodeCount > 0 || originalFiles.length > 0) {
      statsHtml = '<div class="tooltip-stats">' +
        (originalFiles.length > 0 ? '<div class="tooltip-stat"><span class="tooltip-stat-value">' + originalFiles.length + '</span><span class="tooltip-stat-label">源文件</span></div>' : '') +
        (nodeCount > 0 ? '<div class="tooltip-stat"><span class="tooltip-stat-value">' + nodeCount + '</span><span class="tooltip-stat-label">节点</span></div>' : '') +
        '</div>';
    }

    tooltipHtml = '<div class="card-tooltip">' +
      (originalFiles.length > 0 ? '<div class="tooltip-label">原始文件</div>' + filesListHtml : '') +
      statsHtml +
      '</div>';
  }

  var card = document.createElement('a');
  card.href = linkHref;
  card.className = 'browse-card';
  card.style.animationDelay = (index * 60) + 'ms';

  card.innerHTML =
    '<div class="card-icon ' + iconClass + '">' + iconSvg + '</div>' +
    '<div class="card-body">' +
      '<div class="card-filename" title="' + escapeHtml(file.filename) + '">' + escapeHtml(displayName) + '</div>' +
      '<div class="card-meta">' +
        '<span class="card-meta-item">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>' +
          displaySize +
        '</span>' +
        (relativeDate ? '<span class="card-meta-dot"></span><span class="card-meta-item">' + escapeHtml(relativeDate) + '</span>' : '') +
      '</div>' +
      sourceBadge +
    '</div>' +
    tooltipHtml;

  return card;
}

function createTaskCard(task, index) {
  var displayName = getDisplayName(task.filename);
  var relativeDate = formatRelativeDate(task.modified);
  var isDone = task.status === 'done';

  var linkHref = '/ui/tree_mindmap.html?file=' + encodeURIComponent('task_' + task.task_id);

  var iconClass = isDone ? 'card-icon--green' : 'card-icon--amber';
  var iconSvg = isDone
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';

  var statusBadge = isDone
    ? '<span class="status-badge status-badge--done"><span class="status-dot"></span>已完成</span>'
    : '<span class="status-badge status-badge--incomplete"><span class="status-dot"></span>未完成</span>';

  var card = document.createElement('a');
  card.href = linkHref;
  card.className = 'browse-card';
  card.style.animationDelay = (index * 60) + 'ms';

  card.innerHTML =
    '<div class="card-icon ' + iconClass + '">' + iconSvg + '</div>' +
    '<div class="card-body">' +
      '<div class="card-filename" title="' + escapeHtml(task.filename) + '">' + escapeHtml(displayName) + '</div>' +
      '<div class="card-meta">' +
        '<span class="card-meta-item">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
          escapeHtml(task.task_id) +
        '</span>' +
        (relativeDate ? '<span class="card-meta-dot"></span><span class="card-meta-item">' + escapeHtml(relativeDate) + '</span>' : '') +
      '</div>' +
      statusBadge +
    '</div>';

  return card;
}

function renderEmptyState(icon, text, hint) {
  return '<div class="empty-state">' +
    '<div class="empty-icon">' + icon + '</div>' +
    '<div class="empty-text">' + escapeHtml(text) + '</div>' +
    '<div class="empty-hint">' + escapeHtml(hint) + '</div>' +
  '</div>';
}

function renderErrorState(message) {
  return '<div class="error-state">' +
    '<div>' + escapeHtml(message) + '</div>' +
    '<button onclick="location.reload()" class="ghost" style="margin-top:12px;font-size:13px;">重试</button>' +
  '</div>';
}

// ── Data Fetching ──

async function fetchFiles() {
  var container = document.getElementById('filesContainer');
  var countEl = document.getElementById('filesCount');

  try {
    var response = await fetch('/api/files');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    var files = data.files || [];

    container.innerHTML = '';
    countEl.textContent = files.length > 0 ? '(' + files.length + ')' : '';

    if (files.length === 0) {
      container.innerHTML = renderEmptyState(
        '📁',
        '暂无本地知识树',
        '上传 PDF 文件后，知识树将显示在这里'
      );
      return;
    }

    var grid = document.createElement('div');
    grid.className = 'card-grid';

    files.forEach(function(file, index) {
      grid.appendChild(createFileCard(file, index));
    });

    container.appendChild(grid);

  } catch (err) {
    container.innerHTML = renderErrorState('加载本地文件失败: ' + (err.message || '未知错误'));
    console.error('Failed to fetch files:', err);
  }
}

async function fetchTasks() {
  var container = document.getElementById('tasksContainer');
  var countEl = document.getElementById('tasksCount');

  try {
    var response = await fetch('/api/tasks');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var data = await response.json();
    var tasks = data.tasks || [];

    container.innerHTML = '';
    countEl.textContent = tasks.length > 0 ? '(' + tasks.length + ')' : '';

    if (tasks.length === 0) {
      container.innerHTML = renderEmptyState(
        '⏰',
        '暂无历史任务',
        '处理 PDF 文件后，任务记录将显示在这里'
      );
      return;
    }

    var grid = document.createElement('div');
    grid.className = 'card-grid';

    tasks.forEach(function(task, index) {
      grid.appendChild(createTaskCard(task, index));
    });

    container.appendChild(grid);

  } catch (err) {
    container.innerHTML = renderErrorState('加载历史任务失败: ' + (err.message || '未知错误'));
    console.error('Failed to fetch tasks:', err);
  }
}

// ── Init ──

function init() {
  initTheme();
  fetchFiles();
  fetchTasks();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
