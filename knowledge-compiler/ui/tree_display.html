<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Tree - All Parts</title>
<link rel="stylesheet" href="theme.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--canvas);
  color: var(--ink);
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 450px;
  min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.header {
  padding: 16px 12px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}
.stats {
  padding: 8px 0;
  font-size: 12px;
  color: var(--ink-muted);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.stats span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.theme-toggle {
  cursor: pointer;
  font-size: 13px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.tree-container {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.tree-container::-webkit-scrollbar { width: 6px; }
.tree-container::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* Tree nodes */
.tree-node {
  user-select: none;
}
.node-row {
  display: flex;
  align-items: center;
  padding: 4px 12px 4px 0;
  cursor: pointer;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  transition: background 0.15s;
}
.node-row:hover { background: var(--surface-raised); }
.node-row.active {
  background: rgba(232,168,76,0.08);
  border-left: 3px solid var(--accent);
  padding-left: calc(12px - 3px);
}
.toggle {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--ink-muted);
  flex-shrink: 0;
  transition: transform 0.2s;
  cursor: pointer;
}
.toggle.open { transform: rotate(90deg); }
.toggle.leaf { visibility: hidden; }
.level-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}
.level-1 .level-dot { background: var(--level-1); }
.level-2 .level-dot { background: var(--level-2); }
.level-3 .level-dot { background: var(--level-3); }
.level-4 .level-dot { background: var(--level-4); }
.level-5 .level-dot { background: var(--level-5); }
.node-title {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.level-1 .node-title {
  font-weight: 600;
  font-size: 14px;
}
.children {
  display: none;
}
.children.open {
  display: block;
}

/* Detail panel */
.detail {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--canvas);
}
.detail::-webkit-scrollbar { width: 6px; }
.detail::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--ink-muted);
  font-size: 14px;
}
.detail-header {
  margin-bottom: 20px;
}
.detail-level {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.detail-level.l1 { background: rgba(232,168,76,0.15); color: var(--level-1); }
.detail-level.l2 { background: rgba(58,168,143,0.15); color: var(--level-2); }
.detail-level.l3 { background: rgba(122,157,208,0.15); color: var(--level-3); }
.detail-level.l4 { background: rgba(168,136,204,0.15); color: var(--level-4); }
.detail-level.l5 { background: rgba(232,84,84,0.15); color: var(--level-5); }
.detail-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 16px;
  font-family: var(--font-serif);
}
.detail-section {
  margin-bottom: 20px;
}
.detail-section h3 {
  font-size: 13px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.detail-content {
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink-secondary);
  background: var(--surface-raised);
  padding: 14px;
  border-radius: var(--radius-md);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.breadcrumb {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--ink-muted);
  font-size: 14px;
}

.spinner {
  border: 2px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="header">
      <h1>📚 Knowledge Tree</h1>
      <div class="flex-between items-center mt-2">
        <div class="stats" id="stats">
          <span><span class="spinner"></span>Loading parts...</span>
        </div>
        <div class="theme-toggle" onclick="KT.toggleTheme()">
          <span id="themeIcon">🌙</span>
          <span id="themeLabel">Dark</span>
        </div>
      </div>
    </div>
    <div class="tree-container" id="tree"></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">Select a node to view details</div>
  </div>
</div>

<script src="common.js"></script>
<script>
let treeData = null;
let activeNode = null;
let allNodes = [];

// Load all Part files and merge them
async function loadAllParts() {
  try {
    const partFiles = [];
    // Load parts 1 through 11
    for (let i = 1; i <= 11; i++) {
      const filename = `Part_${i}_tree_enhanced.json`;
      partFiles.push(
        fetch(`../data/tree_parts_enhanced/${filename}`)
          .then(res => {
            if (!res.ok) throw new Error(`Failed to load ${filename}`);
            return res.json();
          })
          .catch(err => {
            console.error(`Error loading ${filename}:`, err);
            return null;
          })
      );
    }

    const parts = await Promise.all(partFiles);
    const validParts = parts.filter(p => p !== null);

    // Merge all parts into a single tree
    const mergedTree = {
      title: "Knowledge Tree",
      level: 0,
      children: validParts
    };

    return mergedTree;
  } catch (error) {
    console.error('Error loading parts:', error);
    throw error;
  }
}

async function load() {
  try {
    KT.initTheme();
    treeData = await loadAllParts();
    allNodes = [];
    flattenNodes(treeData, []);
    renderStats();
    renderTree(treeData.children, document.getElementById('tree'), 0);
  } catch (error) {
    console.error('Fatal error:', error);
    document.getElementById('stats').innerHTML = '<span style="color: var(--danger);">Error loading data</span>';
  }
}

function flattenNodes(node, path) {
  const currentPath = [...path, node.title];
  allNodes.push({ node, path: currentPath });
  if (node.children) {
    for (const child of node.children) {
      flattenNodes(child, currentPath);
    }
  }
}

function renderStats() {
  const total = allNodes.length;
  document.getElementById('stats').innerHTML = `
    <span>Total Nodes: <strong>${total}</strong></span>
    <span>Parts: <strong>11</strong></span>
  `;
}

function renderTree(children, container, depth) {
  if (!children || !Array.isArray(children)) return;

  for (const node of children) {
    const hasChildren = node.children && node.children.length > 0;
    const level = node.level || 1;

    const wrapper = document.createElement('div');
    wrapper.className = 'tree-node';

    const row = document.createElement('div');
    row.className = `node-row level-${level}`;
    row.style.paddingLeft = `${12 + depth * 16}px`;

    const toggle = document.createElement('span');
    toggle.className = `toggle ${hasChildren ? '' : 'leaf'}`;
    toggle.textContent = '▶';

    const dot = document.createElement('span');
    dot.className = 'level-dot';

    const title = document.createElement('span');
    title.className = 'node-title';
    title.textContent = node.title;
    title.title = node.title;

    row.appendChild(toggle);
    row.appendChild(dot);
    row.appendChild(title);

    // Build current path
    const currentPath = [node.title];

    // Toggle expand/collapse
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasChildren) {
        childrenContainer.classList.toggle('open');
        toggle.classList.toggle('open');
      }
      showDetail(node, currentPath);
    });

    // Show detail on node click
    title.addEventListener('click', (e) => {
      e.stopPropagation();
      showDetail(node, currentPath);
    });

    wrapper.appendChild(row);

    // Create children container
    const childrenContainer = document.createElement('div');
    childrenContainer.className = 'children';
    wrapper.appendChild(childrenContainer);

    // Render children recursively
    if (hasChildren) {
      renderTree(node.children, childrenContainer, depth + 1);
    }

    container.appendChild(wrapper);
  }
}

function showDetail(node, path) {
  activeNode = node;

  // Update active state
  document.querySelectorAll('.node-row.active').forEach(row => {
    row.classList.remove('active');
  });

  // Find and highlight the clicked row
  const rows = document.querySelectorAll('.node-row');
  for (const row of rows) {
    if (row.querySelector('.node-title').textContent === node.title) {
      row.classList.add('active');
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      break;
    }
  }

  // Build detail panel
  const detailPanel = document.getElementById('detail');
  const level = node.level || 1;

  let html = '<div class="detail-header">';

  // Breadcrumb
  if (path && path.length > 1) {
    html += `<div class="breadcrumb">${path.join(' > ')}</div>`;
  }

  // Level badge
  html += `<div class="detail-level l${level}">Level ${level}</div>`;

  // Title
  html += `<div class="detail-title">${node.title}</div>`;
  html += '</div>';

  // Content
  if (node.content) {
    html += `
      <div class="detail-section">
        <h3>Content</h3>
        <div class="detail-content">${KT.formatContent(node.content, node.keywords, 0, node.highlights)}</div>
      </div>
    `;
  }

  // Summary
  if (node.summary) {
    html += `
      <div class="detail-section">
        <h3>Summary</h3>
        <div class="detail-content">${KT.escapeHtml(node.summary)}</div>
      </div>
    `;
  }

  // Highlights
  if (node.highlights && node.highlights.length > 0) {
    html += KT.renderHighlights(node.highlights);
  }

  // Keywords
  if (node.keywords && node.keywords.length > 0) {
    html += `
      <div class="detail-section">
        <h3>Keywords</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          ${node.keywords.map(function(k) {
            if (typeof k === 'object' && k.term) {
              return '<span class="keyword-tag-wrapper"><span class="keyword-tag">' + KT.escapeHtml(k.term) + '</span>'
                + (k.context ? '<span class="keyword-tooltip">' + KT.escapeHtml(k.context) + '</span>' : '')
                + '</span>';
            }
            return '<span class="keyword-tag">' + KT.escapeHtml(k) + '</span>';
          }).join('')}
        </div>
      </div>
    `;
  }

  // Exam points
  if (node.exam_points && node.exam_points.length > 0) {
    html += '<div class="detail-section"><h3>Exam Points</h3>';
    for (const point of node.exam_points) {
      html += `
        <div style="background: var(--surface-raised); padding: 12px; border-radius: var(--radius-md); margin-bottom: 8px;">
          <div style="font-size: 14px; margin-bottom: 6px;">${KT.escapeHtml(point.point)}</div>
          <div style="font-size: 12px; color: var(--ink-muted); display: flex; gap: 12px;">
            ${point.type ? `<span>${KT.escapeHtml(point.type)}</span>` : ''}
            ${point.frequency ? `<span>${KT.escapeHtml(point.frequency)}</span>` : ''}
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  // Children count
  if (node.children && node.children.length > 0) {
    html += `<div class="detail-section"><div style="font-size: 13px; color: var(--ink-muted);">📁 This node has ${node.children.length} child node(s)</div></div>`;
  }

  detailPanel.innerHTML = html;
}

// Initialize
window.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
